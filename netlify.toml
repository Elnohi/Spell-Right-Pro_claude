  from = "/api/word-submit"
  to = "/.netlify/functions/word-submit"
  status = 200
  force = true

[[redirects]]
  from = "/api/word-admin"
  to = "/.netlify/functions/word-admin"
  status = 200
  force = true

# ─── Catch-all (LAST — no force so real files take precedence) ───────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security headers (all pages) ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"

# Digital Asset Links
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service worker — never cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# HTML — never cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS — 1 hour (allows updates without full immutable cache busting)
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# main-premium.js — never cache (always serve fresh)
[[headers]]
  for = "/js/main-premium.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# CSS — 1 hour
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Data files — 1 hour
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Assets — long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }
