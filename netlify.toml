[build]
  publish = "."
  command = "node inject-version.js || true"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# ─── Static asset pass-throughs ─────────────────────────────────────
# Must come before the catch-all so JSON/JS/CSS fetches are never
# intercepted and served as index.html.
[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200

[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

