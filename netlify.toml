# netlify.toml — SpellRightPro deploy config

[[plugins]]
  package = "./netlify/plugins/inject-sw-version"

# sw.js: never cache — browser must always fetch fresh so it can detect updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML pages: always revalidate so users get new deploys immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# JS/CSS/images: cache aggressively (sw.js version bump will bust these)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
