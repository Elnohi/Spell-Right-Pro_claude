      <button class="ri-edit-skip" data-skip="${i}">&#10005; Remove</button>
    </div>
  </div>
</div>`;
  }

  // ── Normal stop ──────────────────────────────────────────────────────────
  return `<div class="ri ${isL ? 'rl' : ''}" data-ridx="${i}">
  <div class="ri-l">
    <div class="rn">${i + 1}</div>
    ${hn ? `<div class="rpkg"><div class="rpkg-l">pkg</div><div class="rpkg-v">${'#'+s.flexNum}</div></div>` : '<div style="height:4px"></div>'}
  </div>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
    <div class="ri-addr" style="flex:1">${escH(s.address)}</div>
    ${s.coords ? `<a href="https://www.google.com/maps/search/?api=1&query=${s.coords.lat},${s.coords.lon}" target="_blank"
      style="flex-shrink:0;font-size:11px;color:var(--t3);text-decoration:none;padding:3px 7px;border:1px solid var(--brd);border-radius:6px;white-space:nowrap;margin-top:2px"
      title="Verify this location on Google Maps">&#128205; verify</a>` : ''}
  </div>
  ${(s.pkgCount||1) > 1 ? `<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,153,0,.15);border:1px solid var(--acc);color:var(--acc);font-size:12px;font-weight:700;padding:3px 9px;border-radius:10px;margin-top:6px;font-family:var(--sans)">&#128230; ${s.pkgCount} packages at this stop</div>` : ''}
  ${isL ? `<div class="ri-tag">LAST</div>` : ''}
</div>`;
}

function addStop(text, flexNum, skipRender, pkgCount) {
  if (!text?.trim()) return false;
  pkgCount = pkgCount || 1;
  // Merge same addresses — add packages instead of discarding
  var norm = text.trim().toLowerCase().replace(/\s+/g, ' ').replace(/,\s*/g, ',');
  var existing = S.stops.find(function(s) {
    return s.address.toLowerCase().replace(/\s+/g,' ').replace(/,\s*/g,',') === norm;
  });
  if (existing) {
    // Use MAX, not SUM — same stop appears in multiple overlapping screenshots
  // 3 screenshots × 6 packages = 18 (wrong). Should be 6 (the real count).
  existing.pkgCount = Math.max(existing.pkgCount || 1, pkgCount || 1);
    if (!skipRender) { saveSession(); render(); }
    return true;
  }

  var newStop = { id: mkId(), address: text.trim(), flexNum: flexNum ?? null, coords: null, pkgCount: pkgCount };

  if (!skipRender && flexNum == null && S.stops.length > 0) {
    // Manual stop: insert in the middle of the list so it doesn't default to last.
    // Specifically insert after the midpoint so OSRM can move it to the right spot.
    var mid = Math.floor(S.stops.length / 2);
    S.stops.splice(mid, 0, newStop);
  } else {
    S.stops.push(newStop);
  }

  S.manVal = ''; S.errMsg = '';
  if (!skipRender) {
    saveSession();
    render();
    if (flexNum == null) {
      trackEvent('stop_added_manually', { total_stops: S.stops.length });
    }
  }
  return true;
}
function rmStop(id) { S.stops = S.stops.filter(s => s.id !== id); if (S.lastId === id) S.lastId = null; render(); }
function togLast(id) { S.lastId = S.lastId === id ? null : id; render(); }
function mvStop(id, dir) {
  const i = S.stops.findIndex(s => s.id === id); if (i < 0) return;
  const j = i + dir; if (j < 0 || j >= S.stops.length) return;
  [S.stops[i], S.stops[j]] = [S.stops[j], S.stops[i]]; render();
}
function clrAll() {
  if (!confirm('Clear all stops?')) return;
  S.stops = []; S.lastId = null; S.errMsg = '';
  S.savings = null; S.optimized = []; S.geoFailed = [];
  clearSession(); render();
}
async function getGPS() {
  if (!navigator.geolocation) {
    toast('GPS not available — type your location below');
    return;
  }
  const btn = document.getElementById('gpsBtn');
  if (btn) { btn.textContent = 'Getting location...'; btn.disabled = true; }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      S.gpsCoords = { lat, lon };
      try {
        const res = await fetch('https://photon.komoot.io/reverse?lon=' + lon + '&lat=' + lat);
        const data = await res.json();
        const p = data.features && data.features[0] && data.features[0].properties;
        if (p) {
          S.gpsAddr = [p.housenumber, p.street, p.city].filter(Boolean).join(' ');
          S.startAddr = S.gpsAddr;
          localStorage.setItem('fr_start', S.startAddr);
        } else {
          S.gpsAddr = lat.toFixed(5) + ', ' + lon.toFixed(5);
          S.startAddr = S.gpsAddr;
        }
      } catch(e) {
        S.gpsAddr = lat.toFixed(5) + ', ' + lon.toFixed(5);
        S.startAddr = S.gpsAddr;
      }
      render();
      toast('GPS location locked!');
    },
    function(err) {
      const msgs = {1:'Location permission denied', 2:'GPS signal not found', 3:'GPS timed out'};
      toast(msgs[err.code] || 'GPS unavailable — type your location instead');
      if (btn) { btn.textContent = 'Use GPS'; btn.disabled = false; }
      render();
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

function shareRoute() {
  trackEvent('route_shared', {
    stop_count: S.optimized ? S.optimized.length : 0,
    region: S.userState || 'unknown',
    saved_km: S.savings ? S.savings.savedKm : 0
  });
  var lines = S.optimized.filter(function(s){return !s.geoFailed;}).map(function(s,i){
    return (i+1) + '. ' + s.address;
  });
  if (S.home) lines.push('Home: ' + S.home);
  var text = 'My FlexRoute (' + lines.length + ' stops):\n' + lines.join('\n');
  if (navigator.share) {
    navigator.share({ title: 'FlexRoute', text: text })
      .catch(function(){});
  } else {
    navigator.clipboard && navigator.clipboard.writeText(text)
      .then(function(){ toast('\u2713 Route copied to clipboard'); })
      .catch(function(){ toast('Use the Copy button above'); });
  }
}
function copyToClipboard(text) {
  try { navigator.clipboard.writeText(text); return; } catch(e) {}
  var ta=document.createElement("textarea"); ta.value=text; ta.style.cssText="position:fixed;opacity:0;top:0;left:0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}


function fallbackCopy(text) {
  // Fallback for older Android, in-app browsers, HTTP environments
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) toast('✓ Route copied!');
    else toast('Tap + hold to copy manually');
  } catch(e) {
    toast('Copy not supported — try sharing instead');
  }
}

function copyRoute() {
  trackEvent('route_copied', {
    stop_count: S.optimized ? S.optimized.length : 0,
    region: S.userState || 'unknown',
    saved_km: S.savings ? S.savings.savedKm : 0
  });
  const lines = [
    S.home ? `Start: ${S.home}` : '',
    S.savings ? `Saved: ${S.savings.savedKm}km, ~${S.savings.savedMin}min vs Amazon order${S.savings.realGPS ? ' (real GPS)' : ''}` : '',
    ...S.optimized.map((s, i) => `${i + 1}.${s.flexNum != null ? ` [pkg #${s.flexNum}]` : ''} ${s.address}`)
  ].filter(Boolean).join('\n');
  // Primary: Clipboard API (HTTPS, modern browsers)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lines).then(function() {
      toast('✓ Route copied!');
      trackEvent('route_copied', { stop_count: S.optimized.length });
    }).catch(function() {
      fallbackCopy(lines);
    });
  } else {
    fallbackCopy(lines);
  }
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── File handling ────────────────────────────────────────────────────────────
// fi change handled by delegation below

async function handleFiles(files) {
  const pdfs = files.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  const imgs = files.filter(f => f.type.startsWith('image/'));
  if (pdfs.length > 0) {
    toast('Reading PDF… converting pages');
    const allImgs = [...imgs];
    for (const pdf of pdfs) {
      try { allImgs.push(...(await pdfToImages(pdf))); }
      catch(e) { S.errMsg = 'PDF could not be read. Try a screenshot instead.'; render(); return; }
    }
    if (!allImgs.length) { S.errMsg = 'No readable content in PDF.'; render(); return; }
    await handleFiles(allImgs); return;
  }
  if (!imgs.length) { S.errMsg = 'Please upload image or PDF files.'; render(); return; }
  S.sc = { done: 0, total: imgs.length, msg: 'Reading images...' };
  S.errMsg = ''; render();
  let added = 0, failed = 0, lastErr = '';
  for (let i = 0; i < imgs.length; i++) {
    S.sc = { done: i, total: imgs.length, msg: `Scanning image ${i + 1} of ${imgs.length}...` };
    render();
    try {
      const items = await extractFromFile(imgs[i]);
      for (const it of items) {
        if (addStop(it.address, it.num, true, it.pkgCount || 1)) added++;
      }
    } catch (err) {
      failed++;
      if (err.message === 'CDN_BLOCKED') {
        lastErr = 'CDN_BLOCKED';
      } else {
        lastErr = err.message || String(err);
      }
      tesseractWorker = null;
    }
    S.sc = { done: i + 1, total: imgs.length, msg: `Scanning image ${i + 1} of ${imgs.length}...` };
    render();
  }
  S.sc = null;
  // Infer delivery city from the most common city name across scanned stops.
  // Used as fallback in geocode() for partial addresses that have no city component.
  if (added > 0 && !S._inferredCity) {
    var _cHits = {};
    var _provRe = /^(ON|BC|AB|QC|MB|SK|NS|NB|NL|PE|AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)$/i;
    S.stops.forEach(function(s) {
      var cm = s.address && s.address.match(/,\s*([A-Za-z][A-Za-z\s]{2,20})(?:,|$)/);
      if (cm) { var c = cm[1].trim(); if (c.length > 3 && !_provRe.test(c)) _cHits[c] = (_cHits[c]||0)+1; }
    });
    var _topCity = Object.keys(_cHits).sort(function(a,b){ return _cHits[b]-_cHits[a]; })[0];
    if (_topCity) { S._inferredCity = _topCity; console.log('[FlexRoute] Inferred city:', _topCity); }
  }
  // Renumber flexNum sequentially across all uploaded images (fixes 1,2,3,1,2,3 issue)
  var flexStops = S.stops.filter(function(s){ return s.flexNum != null; });
  flexStops.forEach(function(s, i){ s.flexNum = i + 1; });
  flexStops.forEach(function(s, i){ s.flexNum = i + 1; s.flexNumEnd = i + 1; });
  // CDN blocked — scanner can't load
  if (lastErr === 'CDN_BLOCKED') {
    // Detect likely cause: in-app browser vs preview environment
    var _isInApp = /Instagram|FBAV|FBAN|Twitter|Line|LinkedInApp|Snapchat|TikTok/i.test(navigator.userAgent);
    var _isIOS   = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (_isInApp) {
      S.errMsg = '⚠ Open FlexRoute in Safari or Chrome — in-app browsers (Instagram, Facebook, etc.) block the scanner. Tap ··· → Open in Browser, then come back.';
    } else if (_isIOS) {
      S.errMsg = '⚠ Scanner failed to load. Try: 1) Refresh the page, or 2) Open in Chrome for iOS. You can also add stops manually using the text field above.';
    } else {
      S.errMsg = '⚠ Screenshot scanning requires the live app at flexrouteapp.com — the OCR engine can\'t load in preview mode. You can still add stops manually using the text field above.';
    }
    trackEvent('ocr_load_failed', { reason: _isInApp ? 'in_app_browser' : (_isIOS ? 'ios_cdn' : 'preview'), ua: navigator.userAgent.substring(0, 80) });
    render(); return;
  }
  if (lastErr === 'TESSERACT_TIMEOUT') {
    S.errMsg = '⚠ Scanner timed out. For best results on iPhone, open FlexRoute in Safari (not in-app). You can also add stops manually using the text field above.';
    render(); return;
  }
  if (added === 0 && failed === imgs.length) {
    S.errMsg = lastErr || 'OCR failed to read the image.';
  } else if (added === 0) {
    // Show debug info — what did Tesseract actually read?
    const rawLines = (S._lastOCR || '').split('\n').filter(l => l.trim()).length;
    S.errMsg = `OCR read ${rawLines} lines but found no delivery addresses. Tip: take 3-4 overlapping screenshots scrolling through your Flex list and upload them all at once — works better than one long scrolling shot.`;
    S._showDebug = true;
  } else {
    S._showDebug = false;
    saveSession();
    toast(`${added} stop${added > 1 ? 's' : ''} added`);
    // Analytics: screenshot scanned successfully
    trackEvent('screenshot_scanned', {
      stops_found: added,
      images_uploaded: imgs.length
    });
  }
  render();
}

async function extractFromFile(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onerror = rej;
    r.onload = async e => {
      const b64 = e.target.result.split(',')[1];
      try { res(await geminiExtract(b64, file.type)); } catch (err) { rej(err); }
    };
    r.readAsDataURL(file);
  });
}

// ─── Main optimize flow ───────────────────────────────────────────────────────
async function optimize() {
  // Save startAddr immediately — persists through all render() calls during optimization
  if (S.startAddr && S.startAddr.trim()) {
    localStorage.setItem('fr_sa', S.startAddr);
  }
  const he = document.getElementById('hi');
  if (he && he.value.trim()) { S.home = he.value.trim(); localStorage.setItem('fr_hm', S.home); }
  const se = document.getElementById('startInput');
  if (se && se.value.trim()) { S.startAddr = se.value.trim(); localStorage.setItem('fr_sa', S.startAddr); }
  if (!S.stops.length) { S.errMsg = 'Add at least one stop first.'; render(); return; }
  S.errMsg = ''; S.savings = null; S.geoFailed = []; S.tweakMode = false;
  S.ldStep = 0; S.ldProg = 0; S.phase = 'optimizing'; render();
  trackEvent('route_optimization_started', {
    stop_count: S.stops.length,
    has_home: !!S.home,
    has_start: !!S.startAddr,
    scanned_stops: S.stops.filter(s => s.flexNum != null).length,
    manual_stops: S.stops.filter(s => s.flexNum == null).length
  });

  // Step 1 — Geocode all addresses including start and home
  const toGeocode = [
    { key: '__home__',  address: S.home },
    { key: '__start__', address: S.startAddr },
    ...S.stops.map(s => ({ key: s.id, address: s.address }))
  ].filter(x => x.address);

  const coordMap = {};
  let done = 0;
  let biasLat = null, biasLon = null, biasCount = 0;
  // Country bounding boxes — reject home/start geocode if outside expected region
  function _inCountry(lat, lon, state) {
    var cc = state ? stateToCountry(state) : null;
    if (cc === 'ca') return lat > 41 && lat < 84 && lon > -142 && lon < -52;
    if (cc === 'us') return lat > 24 && lat < 72 && lon > -172 && lon < -66;
    if (cc === 'gb') return lat > 49 && lat < 62 && lon > -9 && lon < 3;
    return true;
  }
  if (S.home) {
    const homePreview = await geocode(S.home);
    if (homePreview && _inCountry(homePreview.lat, homePreview.lon, S.userState)) {
      biasLat = homePreview.lat; biasLon = homePreview.lon;
    }
  }
  // Sequential geocoding — one at a time to avoid rate-limiting Photon/Nominatim
  for (let i = 0; i < toGeocode.length; i++) {
    const x = toGeocode[i];
    var addr = x.address;
    if (S.userState && addr && !new RegExp(',\s*' + S.userState + '\s*$').test(addr)) {
      addr = addr.replace(/,\s*(ON|Canada)\s*$/i, '') + ', ' + S.userState;
    }
    const result = await Promise.race([
      geocode(addr, biasLat, biasLon),
      new Promise(res => setTimeout(() => res(null), 12000))
    ]);
    // For home and start, reject results outside the user's country
    // (prevents e.g. "3 Fermoy Rd" geocoding to Fermoy, Ireland)
    var _validResult = result;
    if (result && (x.key === '__home__' || x.key === '__start__')) {
      if (!_inCountry(result.lat, result.lon, S.userState)) _validResult = null;
    }
    coordMap[x.key] = _validResult;
    if (_validResult && x.key === '__home__' && !biasLat) {
      biasLat = _validResult.lat; biasLon = _validResult.lon; // bootstrap bias from home
    } else if (_validResult && x.key === '__start__' && !biasLat) {
      biasLat = _validResult.lat; biasLon = _validResult.lon; // bootstrap bias from depot
    } else if (result && x.key !== '__home__' && x.key !== '__start__') {
      biasLat = biasLat ? (biasLat * biasCount + result.lat) / (biasCount + 1) : result.lat;
      biasLon = biasLon ? (biasLon * biasCount + result.lon) / (biasCount + 1) : result.lon;
      biasCount++;
    }
    if (!result && x.key !== '__home__' && x.key !== '__start__') {
      if (!S.geoFailed.includes(x.address)) S.geoFailed.push(x.address);
      var failedStop = S.stops.find(function(s){ return s.id === x.key; });
      if (failedStop) failedStop.geoFailed = true;
    }
    done++;
    S.ldProg = Math.round(done / toGeocode.length * 100);
    render();
    if (i < toGeocode.length - 1) await sleep(400);
  }

  // *** THE CRITICAL SECTION — was missing from broken version ***
  S.homeCoords = coordMap['__home__'] || null;
  let startCoords = S.gpsCoords ? { lon: S.gpsCoords.lon, lat: S.gpsCoords.lat } : null;
  if (!startCoords && S.startAddr && S.startAddr.trim()) {
    startCoords = coordMap['__start__'] || await geocode(S.startAddr, biasLat, biasLon);
    localStorage.setItem('fr_sa', S.startAddr);
  }
  S.stops.forEach(s => { s.coords = coordMap[s.id] || null; });

  // Post-geocode outlier rescue pass
  // When a stop geocodes to the wrong city/country (e.g. Church St Toronto → London UK),
  // instead of dropping it, we try to re-geocode it using the delivery cluster centroid
  // as a strong geographic hint. Multiple fallback strategies are tried silently.
  // The driver never sees this happening — stop either gets rescued or shows in fix screen.
  {
    const _og = S.stops.filter(s => s.coords && !s.geoFailed);
    if (_og.length >= 3) {
      const _lats = _og.map(s => s.coords.lat).sort((a,b)=>a-b);
      const _lons = _og.map(s => s.coords.lon).sort((a,b)=>a-b);
      const _mLat = _lats[Math.floor(_lats.length / 2)];
      const _mLon = _lons[Math.floor(_lons.length / 2)];
      const _ds   = _og.map(s => haversineKm(s.coords.lat, s.coords.lon, _mLat, _mLon));
      const _mad  = _ds.slice().sort((a,b)=>a-b)[Math.floor(_ds.length/2)] || 5;
      const _cut  = Math.max(_mad * 3, 50);

      // Find outliers and try to rescue them
      const _outliers = _og.filter((s, i) => _ds[i] > _cut);
      if (_outliers.length > 0) {
        console.log('[FlexRoute] Attempting silent rescue of', _outliers.length, 'outlier stop(s)');
        for (const _os of _outliers) {
          console.warn('[FlexRoute] Outlier detected:', _os.address,
            _ds[_og.indexOf(_os)].toFixed(0)+'km from cluster — trying to rescue');

          // Strategy 1: Re-geocode with strong centroid bias (forces results near delivery area)
          var _rescued = await geocode(_os.address, _mLat, _mLon);
          if (_rescued && haversineKm(_rescued.lat, _rescued.lon, _mLat, _mLon) <= _cut) {
            console.log('[FlexRoute] Rescued via centroid bias:', _os.address);
            _os.coords = _rescued; continue;
          }

          // Strategy 2: Strip unit/apartment numbers — "2510-82 Dalhousie St" → "82 Dalhousie St"
          var _stripped = _os.address
            .replace(/^\w{0,2}\d{2,4}-(\d+\s+)/, '$1')
            .replace(/(unit|apt|apartment|suite|ste|#|fl|floor)\s*#?\s*\w+/gi, '')
            .replace(/\s+\d{3,4}(\s*,|$)/, '$2')
            .replace(/\s{2,}/g,' ').trim();
          if (_stripped !== _os.address) {
            var _r2 = await geocode(_stripped, _mLat, _mLon);
            if (_r2 && haversineKm(_r2.lat, _r2.lon, _mLat, _mLon) <= _cut) {
              console.log('[FlexRoute] Rescued via strip:', _os.address, '→', _stripped);
              _os.coords = _r2; continue;
            }
          }

          // Strategy 3: Street name + inferred city only (drop building number)
          var _cityPart = (_os.address.match(/,\s*([A-Za-z][A-Za-z\s]{2,20})(?:,|$)/) || [])[1] ||
                          S._inferredCity || '';
          var _streetPart = _os.address
            .replace(/^\w{0,2}\d[\d-]*\s+/, '') // strip leading number
            .replace(/,.*$/, '')                    // strip city
            .trim();
          if (_streetPart && _cityPart) {
            var _r3 = await geocode(_streetPart + ', ' + _cityPart, _mLat, _mLon);
            if (_r3 && haversineKm(_r3.lat, _r3.lon, _mLat, _mLon) <= _cut) {
              console.log('[FlexRoute] Rescued via street+city:', _os.address, '→', _streetPart + ', ' + _cityPart);
              _os.coords = _r3;
              _os.coords._approximate = true; // flag as approximate — verify link shown
              continue;
            }
          }

          // Strategy 4: Nominatim with bounding box centred on delivery area
          try {
            var _bb = 0.5;
            var _nUrl = 'https://nominatim.openstreetmap.org/search?q='
              + encodeURIComponent(_stripped || _os.address)
              + '&format=json&limit=5'
              + '&viewbox=' + (_mLon-_bb).toFixed(4) + ',' + (_mLat+_bb).toFixed(4)
              + ',' + (_mLon+_bb).toFixed(4) + ',' + (_mLat-_bb).toFixed(4)
              + '&bounded=1'; // CRITICAL: bounded=1 restricts to bounding box only
            var _nr = await fetch(_nUrl);
            if (_nr.ok) {
              var _nd = await _nr.json();
              if (_nd && _nd.length > 0) {
                var _best = _nd.reduce(function(b, c) {
                  var bd = haversineKm(parseFloat(b.lat), parseFloat(b.lon), _mLat, _mLon);
                  var cd = haversineKm(parseFloat(c.lat), parseFloat(c.lon), _mLat, _mLon);
                  return cd < bd ? c : b;
                });
                var _r4 = { lat: parseFloat(_best.lat), lon: parseFloat(_best.lon), _approximate: true };
                if (haversineKm(_r4.lat, _r4.lon, _mLat, _mLon) <= _cut) {
                  console.log('[FlexRoute] Rescued via Nominatim bounded:', _os.address);
                  _os.coords = _r4; continue;
                }
              }
            }
          } catch(e) {}

          // All strategies failed — mark for fix screen
          // Strategy 5 (US only): Census Bureau Geocoder — covers new US addresses
          // not yet in OpenStreetMap. Free, no key, official US address database.
          var _isUS = S.userState && stateToCountry(S.userState) === 'us';
          if (_isUS) {
            try {
              var _censusQ = encodeURIComponent(_os.address);
              var _cUrl = 'https://geocoding.geo.census.gov/geocoder/locations/onelineaddress'
                + '?address=' + _censusQ
                + '&benchmark=Public_AR_Current&format=json';
              var _cr = await fetch(_cUrl);
              if (_cr.ok) {
                var _cd = await _cr.json();
                var _cm = _cd && _cd.result && _cd.result.addressMatches;
                if (_cm && _cm.length > 0) {
                  var _cc = _cm[0].coordinates;
                  var _r5 = { lat: _cc.y, lon: _cc.x };
                  if (haversineKm(_r5.lat, _r5.lon, _mLat, _mLon) <= _cut) {
                    console.log('[FlexRoute] Rescued via Census Bureau:', _os.address);
                    _os.coords = _r5; continue;
                  }
                }
              }
            } catch(e) {}
          }

          // All strategies failed — mark for fix screen
          console.warn('[FlexRoute] Could not rescue:', _os.address, '— showing in fix screen');
          _os.coords = null; _os.geoFailed = true;
          if (!S.geoFailed.includes(_os.address)) S.geoFailed.push(_os.address);
        }
      }

      // Validate home & start coords against cluster (silent drop if wrong country)
      if (S.homeCoords) {
        var _hd = haversineKm(S.homeCoords.lat, S.homeCoords.lon, _mLat, _mLon);
        if (_hd > 200) {
          console.warn('[FlexRoute] Home coord too far ('+_hd.toFixed(0)+'km) — dropped');
          S.homeCoords = null;
        }
      }
      if (startCoords) {
        var _sd = haversineKm(startCoords.lat, startCoords.lon, _mLat, _mLon);
        if (_sd > 200) {
          console.warn('[FlexRoute] Start coord too far ('+_sd.toFixed(0)+'km) — dropped');
          startCoords = null;
        }
      }
    }
  }

  const geocodedStops = S.stops.filter(s => s.coords !== null);
  const failedStops   = S.stops.filter(s => s.coords === null);

  if (S.geoFailed.length > 0) {
    S.phase = 'input';
    S.stops.forEach(function(s) {
      if (S.geoFailed.indexOf(s.address) >= 0) s.geoFailed = true;
      else s.geoFailed = false;
    });
    saveSession(); render();
    toast('\u26a0 Fix ' + S.geoFailed.length + ' address' + (S.geoFailed.length > 1 ? 'es' : '') + ' before optimizing', 5000);
    return;
  }

  if (geocodedStops.length < 2) { await optimizeWithGemini(); return; }

  // Step 2 — OSRM Trip
  S.ldStep = 1; render();
  const lastStop = S.lastId ? geocodedStops.find(s => s.id === S.lastId) : null;
  let orderedForTrip = geocodedStops.filter(s => s.id !== S.lastId);
  if (lastStop) orderedForTrip.push(lastStop);

  const startPt = startCoords || null;
  S._startPt = startPt;
  const tripCoords = [
    ...(startPt ? [startPt] : []),
    ...orderedForTrip.map(s => s.coords),
    ...(S.homeCoords ? [S.homeCoords] : [])
  ];
  const origCoords = [
    ...(startPt ? [startPt] : []),
    ...geocodedStops.map(s => s.coords),
    ...(S.homeCoords ? [S.homeCoords] : [])
  ];

  let optimizedOrder = null;
  let tripDist = null, tripDur = null, origDist = null, origDur = null;
  let realGPS = false;

  try {
    const tripResult = await osrmTrip(tripCoords, !!lastStop);
    if (tripResult) {
      // Sanity check: >80 km/stop average = geocoding error sent bad coords to OSRM
      // Real routes: 17 stops in Toronto ≈ 40-60 km total (2-4 km/stop avg)
      // Bad result: 1 stop geocoded to wrong country = thousands of km → reject
      const _osrmKm = tripResult.distance / 1000;
      const _maxOK  = Math.max(geocodedStops.length * 80, 150);
      if (_osrmKm > _maxOK) {
        console.warn('[FlexRoute] OSRM returned implausible distance: ' +
          _osrmKm.toFixed(0) + 'km for ' + geocodedStops.length + ' stops — falling back to haversine');
        throw new Error('OSRM distance implausible: ' + _osrmKm.toFixed(0) + 'km');
      }
      realGPS = true;
      tripDist = tripResult.distance;
      tripDur  = tripResult.duration;
      S.ldStep = 2; render();
      const origResult = await osrmRoute(origCoords);
      if (origResult) { origDist = origResult.distance; origDur = origResult.duration; }
      const startOffset = startPt ? 1 : 0;
      const endOffset   = S.homeCoords ? 1 : 0;
      optimizedOrder = tripResult.waypoints
        .slice(startOffset, tripResult.waypoints.length - endOffset)
        .map((wp, inputIdx) => ({ inputIdx, routePos: wp.waypoint_index }))
        .sort((a, b) => a.routePos - b.routePos)
        .map(x => orderedForTrip[x.inputIdx])
        .filter(Boolean);
    }
  } catch (e) {
    console.warn('[FlexRoute] OSRM failed:', e);
  }

  if (!optimizedOrder) { await optimizeWithGemini(); return; }

  S.optimized = [...optimizedOrder, ...failedStops];
  // New route = new shift — reset companion progress so it starts fresh
  S.cIdx = 0; S.cDone = []; S.cShiftStart = null;

  if (origDist != null && tripDist != null) {
    const savedKm  = Math.max(0, round1((origDist - tripDist) / 1000));
    const savedMin = Math.max(0, Math.round((origDur - tripDur) / 60));
    S.savings = {
      origKm: round1(origDist / 1000), optKm: round1(tripDist / 1000),
      origMin: Math.round(origDur / 60), optMin: Math.round(tripDur / 60),
      savedKm, savedMin, realGPS: true
    };
  }

  trackEvent('route_optimized', {
    stop_count: S.optimized.length, method: 'gps_osrm',
    saved_km: S.savings ? S.savings.savedKm : 0,
    saved_min: S.savings ? S.savings.savedMin : 0,
    orig_km: S.savings ? S.savings.origKm : 0,
    geo_failed: S.geoFailed.length,
    region: S.userState || 'unknown'
  });
  saveSession();
  S.phase = 'result'; render();
}


// ─── Fallback: local 2-opt optimization using haversine distances ────────────
// Used when OSRM is unavailable. Still significantly better than Amazon's order.
async function optimizeWithGemini() {
  S.ldStep = 1; render();

  const geocodedStops = S.stops.filter(s => s.coords);
  if (geocodedStops.length < 2) {
    S.optimized = [...S.stops];
    S.phase = 'result'; render(); return;
  }

  // Build haversine distance matrix
  const n = geocodedStops.length;
  const dist = [];
  for (var i = 0; i < n; i++) {
    dist[i] = [];
    for (var j = 0; j < n; j++) {
      dist[i][j] = haversineKm(
        geocodedStops[i].coords.lat, geocodedStops[i].coords.lon,
        geocodedStops[j].coords.lat, geocodedStops[j].coords.lon
      );
    }
  }

  // Nearest-neighbour seed route
  const visited = new Array(n).fill(false);
  const route = [0];
  visited[0] = true;
  for (var k = 1; k < n; k++) {
    var last = route[route.length - 1];
    var best = -1, bestD = Infinity;
    for (var m = 0; m < n; m++) {
      if (!visited[m] && dist[last][m] < bestD) { bestD = dist[last][m]; best = m; }
    }
    route.push(best); visited[best] = true;
  }

  // 2-opt improvement (up to 60 passes)
  function routeLen(r) {
    var d = 0;
    for (var i = 0; i < r.length - 1; i++) d += dist[r[i]][r[i+1]];
    return d;
  }
  var improved = true, passes = 0;
  while (improved && passes < 60) {
    improved = false; passes++;
    for (var a = 0; a < n - 1; a++) {
      for (var b = a + 2; b < n; b++) {
        var gain = dist[route[a]][route[a+1]] + dist[route[b]][route[(b+1)%n]]
                 - dist[route[a]][route[b]]   - dist[route[a+1]][route[(b+1)%n]];
        if (gain > 0.01) {
          // Reverse segment a+1..b
          var seg = route.slice(a+1, b+1).reverse();
          for (var x = 0; x < seg.length; x++) route[a+1+x] = seg[x];
          improved = true;
        }
      }
    }
  }

  // Calculate estimated savings (30 km/h urban average)
  const origIdx = geocodedStops.map((_, i) => i);
  function routeLenFull(r) {
    var d = routeLen(r);
    const sp = S._startPt, hp = S.homeCoords;
    const first = geocodedStops[r[0]], last = geocodedStops[r[r.length - 1]];
    if (sp && first) { var sd = haversineKm(sp.lat, sp.lon, first.coords.lat, first.coords.lon); if (sd < 300) d += sd; }
    if (hp && last)  { var hd = haversineKm(last.coords.lat, last.coords.lon, hp.lat, hp.lon); if (hd < 300) d += hd; }
    return d;
  }
  const origKm  = round1(routeLenFull(origIdx));
  const optKm   = round1(routeLenFull(route));
  const savedKm = Math.max(0, round1(origKm - optKm));

  S.optimized = route.map(i => geocodedStops[i]);
  // Failed stops handled in vFix screen — not appended to result

  if (savedKm > 0) {
    const spd = 30; // km/h urban estimate
    S.savings = {
      origKm, optKm,
      origMin: Math.round(origKm / spd * 60),
      optMin:  Math.round(optKm  / spd * 60),
      savedKm,
      savedMin: Math.max(0, Math.round(savedKm / spd * 60)),
      realGPS: false
    };
  }

  trackEvent('route_optimized', {
    stop_count: S.optimized.length, method: 'haversine_2opt',
    saved_km: S.savings ? S.savings.savedKm : 0,
    saved_min: S.savings ? S.savings.savedMin : 0,
    orig_km: S.savings ? S.savings.origKm : 0,
    geo_failed: S.geoFailed.length,
    region: S.userState || 'unknown'
  });
  var _failedStops = S.stops.filter(function(s){ return s.geoFailed; });
  if (_failedStops.length > 0) {
    S.phase = 'fixing';
  } else {
    S.phase = 'result';
  }
  render();
}

// ── Tesseract OCR — reads images in-browser, no API needed ──────────────────
let tesseractWorker = null;

// Dynamically load Tesseract from fallback CDN if unpkg failed
async function _loadTesseractFallback() {
  if (typeof Tesseract !== 'undefined') return true;
  const fallbackCdns = [
    'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js'
  ];
  for (var _cdn of fallbackCdns) {
    try {
      await new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = _cdn;
        s.onload = resolve;
        s.onerror = reject;
        setTimeout(function() { reject(new Error('CDN timeout')); }, 8000);
        document.head.appendChild(s);
      });
      if (typeof Tesseract !== 'undefined') {
        console.log('[FlexRoute] Tesseract loaded from fallback CDN:', _cdn);
        return true;
      }
    } catch(_e) { continue; }
  }
  return false;
}

async function getTesseract() {
  if (tesseractWorker) return tesseractWorker;
  // Load Tesseract if primary CDN failed (common on iOS Safari / in-app browsers)
  if (typeof Tesseract === 'undefined' || window._tesseractCdnFailed) {
    S.sc = Object.assign({}, S.sc, { msg: 'Loading scanner… (first time may take a moment on iOS)' });
    render();
    const loaded = await _loadTesseractFallback();
    if (!loaded) throw new Error('CDN_BLOCKED');
    window._tesseractCdnFailed = false;
  }
  // Create worker — 12s timeout, auto-retry once on failure
  async function _makeWorker() {
    const timeout = new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error('TESSERACT_TIMEOUT')); }, 12000);
    });
    return Promise.race([
      Tesseract.createWorker('eng', 1, { logger: function() {} }),
      timeout
    ]);
  }
  try {
    tesseractWorker = await _makeWorker();
  } catch(e) {
    if (e.message === 'TESSERACT_TIMEOUT') {
      // Retry once — Safari sometimes needs a second attempt
      console.warn('[FlexRoute] Tesseract worker timed out, retrying…');
      S.sc = Object.assign({}, S.sc, { msg: 'Scanner slow to start — retrying…' });
      render();
      tesseractWorker = await _makeWorker();
    } else { throw e; }
  }
  return tesseractWorker;
}

async function geminiExtract(b64, mediaType) {
  // Convert base64 to blob for Tesseract
  const byteChars = atob(b64);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
  const blob = new Blob([bytes], { type: mediaType });
  const url = URL.createObjectURL(blob);

  try {
    const worker = await getTesseract();
    const { data: { text } } = await worker.recognize(url);
    URL.revokeObjectURL(url);
    // Store raw text for debug
    S._lastOCR = text;
    const parsed = parseFlexOCR(text);
    const allLines = text.split('\n').filter(l => l.trim());
    console.log('[FlexRoute OCR] raw lines:', allLines.length, 'parsed stops:', parsed.length);
    // Log full text in chunks of 50 lines so nothing is truncated
    for (var ci = 0; ci < allLines.length; ci += 50) {
      console.log('[OCR lines ' + ci + '-' + (ci+49) + ']\n' + allLines.slice(ci, ci+50).join('\n'));
    }
    return parsed;
  } catch (err) {
    URL.revokeObjectURL(url);
    tesseractWorker = null;
    if (err.message === 'CDN_BLOCKED') {
      throw new Error('CDN_BLOCKED');
    }
    if (err.message && err.message.includes('timeout')) {
      throw new Error('Image reading timed out. Check your internet connection and try again.');
    }
    throw new Error('OCR failed: ' + err.message);
  }
}

  'Singapore','Woodlands','Tampines','Jurong','Queenstown','Bedok'];

  // Street keywords — no trailing spaces (caused end-of-string miss for "Kingswood Rd")
  var STREET_KW = [' ave',' avenue',' st',' street',' rd',' road',' dr',' drive',
    ' blvd',' boulevard',' cres',' crescent',' court',' way',' place',' park',
    ' lane',' terrace',' trail',' pkwy',' parkway',' gate',' grove',' path',

    ' estates',' acres',' farms',' branch',' cove',' bay',' cv',
    ' broadway',' plaza',' promenade',

    ' crt',' cour',' court',' cove',' cv',' cres',' crescent',
    ' hts',' heights',' terr',' terrace',' trl',' trail',
    ' gdns',' gardens',' grv',' grove',' vw',' view',
    ' xing',' crossing',' lndg',' landing',
    ' nook',' nk',' keep',' kp',
    // European street types (as suffixes in compound words)
    'straße','strasse','straße','gasse','weg','allee','platz','ring','steig','stieg',
    'gatan','vägen','väg','gade','laan','straat','kade','steeg','dreef',
    'corso','piazza','viale','vicolo','largo','contrada',
    'allée','impasse','ruelle','chemin','lieu-dit',
    'camino','paseo','travesía','callejón',
    'ulica','ulitsa','prospekt','pereulok',
    ' close',' grove',' mews',' rise',' walk',' green',' square',
    // French (Canada QC, France)
    ' rue',' ruelle',' chemin',' impasse',' allee',' allée',' route',
    ' rang',' montee',' montée',' côte',' cote',
    // Spanish (Mexico)
    ' calle',' avenida',' carrera',' camino',' paseo',' callejon',
    ' privada',' andador',' prolongacion',
    // German (Germany, Austria, Switzerland)
    'strasse','straße','straße',' weg',' allee',' gasse',' ring',
    ' platz',' damm',' ufer',' chaussee',
    // Swedish/Nordic (Sweden, Norway, Denmark, Finland)
    'gatan','gatan',' vägen',' vagen',' stigen',' torget',' leden',
    'gade','veien','vegen','tiet','katu',
    // UK extras
    ' close',' grove',' row',' vale',' rise',' end',' green',' common',
    // Singapore / Asia
    ' road',' link',' walk',' central',' north',' south',' east',' west',
    ' jalan',' lorong',' bukit'];

  function isCity(line) {
    var low = line.toLowerCase().trim();
    if (CITIES.indexOf(low) >= 0) return true;
    // Soft: short, no digits, not a street — catches cities not in list
    if (low.length >= 3 && low.length <= 35 && !/\d/.test(low)) {
      var hasKw = STREET_KW.some(function(k){ return (' '+low).indexOf(k) >= 0; });
      var isN = /^(deliver|package|itinerary|next|current|after|location|expected|scheduled)/i.test(low);
      if (!hasKw && !isN) return true;
    }
    return false;
  }

  // Strip OCR garbage after the street type word (Road, Ave, Blvd…)
  // "30 506 Donlands Ave, ji —" → "506 Donlands Ave"
  // "18 Valerie Road (side door/Right)" → "18 Valerie Road"
  // "1250 Brimley Road Unit 63" → "1250 Brimley Road Unit 63" (unit preserved)
  // "101-2260 Lawrence Avenue East" → "101-2260 Lawrence Avenue East" (direction preserved)
  function truncateAfterStreetType(addr) {
    var types = 'avenue|ave|street|str|st|road|rd|drive|dr|boulevard|blvd|crescent|cres'
      + '|court|crt|ct|way|place|pl|lane|ln|terrace|terr|trail|trl|parkway|pkwy'
      + '|gate|grove|grv|path|park|square|sq|circle|cir|close|bend|mews'
      + '|heights|hts|gardens|gdns|glen|ridge|commons|view|vista|manor'
      + '|cove|cv|bay|broadway|plaza|row|vale|rise|green|walk|nook|keep'
      + '|hill|hills|wood|woods|pass|point|pt|hollow|ford|crossing|run|loop';
    var dir  = '(?:\\s+(?:east|west|north|south|[ensw](?:\\.|\\b)))?';
    var unit = '(?:\\s*(?:,\\s*)?(?:unit|apt|apartment|suite|ste|#|fl(?:oor)?)\\s*#?\\s*[\\w-]+)?'; // route number: State Road 46, Hwy 30
    var re2  = new RegExp('^(.+\\b(?:' + types + ')\\b' + dir + unit + ')', 'i');
    var m = addr.match(re2);
    if (!m) return addr;
    var core = m[1].trim();
    // Honorific guard: "Dr" or "St" before uppercase proper noun = name prefix, not street type.
    // "1022 Dr Martin Luther King Jr..." → "Dr" is "Doctor", not "Drive" abbreviation.
    if (/\b(Dr|St)\s*$/i.test(core)) {
      var _rem = addr.slice(m[1].length).trim();
      if (/^[A-Z]/.test(_rem)) return addr;
    }
    return core;
  }

  // Strip ALL leading noise — symbols, OCR artifacts, stop number prefixes
  // Handles: ©, ®, *, @, ), a, QO), a7), eo), @9), (4), 4), 20 14, etc.
  function cleanLine(line) {
    var s = line;
    // 0. Split digit+lowercase concatenations (Amazon app display glitch)
    //    "3050pharmacy" → "3050 pharmacy",  "1610unit" → "1610 unit"
    s = s.replace(/(\d)([a-z]{4,})/g, '$1 $2');
    // 1. Strip explicit number prefixes first
    s = s.replace(/^\(\s*\d{1,3}\s*\)\s*/, '');    // (4)
    s = s.replace(/^\d{1,3}\s*[.)\]]\s*/, '');      // 4) 4. 4]
    // 2. Strip symbol noise (including ® registered trademark)
    s = s.replace(/^[©®«»+@\-–•·\s)*,|]+/, '');
    // 3. "20 14 St" pattern — standalone 1-2 digit then address starting with digit

  q = q.replace(/\bRd\.?\b(?=[\s,]|$)/gi, 'Road');
  q = q.replace(/\bDr\.?\b(?=[\s,]|$)/gi, 'Drive');
  q = q.replace(/\bPl\.?\b(?=[\s,]|$)/gi, 'Place');
  q = q.replace(/\bLn\.?\b(?=[\s,]|$)/gi, 'Lane');

      .replace(/\s+/g, ' ').trim();
    if (stripped2 !== address) {
      var c4 = await fetchCandidates(stripped2, 3);
      result = bestCandidate(c4);
    }
  }

  // Google Maps fallback for addresses Photon can't find or places too far from cluster
  if ((!result || (biasLat && biasLon && haversineKm(result.lat, result.lon, biasLat, biasLon) > 10))
      && S.gmapsKey) {
    try {
      const gres = await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='
        + encodeURIComponent(address) + '&key=' + S.gmapsKey);
      if (gres.ok) {
        const gd = await gres.json();
        if (gd.status === 'OK' && gd.results?.[0]) {
          const loc = gd.results[0].geometry.location;
          const gr = { lat: loc.lat, lon: loc.lng };
          if (!result || !biasLat ||
              haversineKm(gr.lat, gr.lon, biasLat, biasLon) <
              haversineKm(result.lat, result.lon, biasLat, biasLon) - 0.5) {
            console.log('[FlexRoute] Google geocode used:', address);
            result = gr;
          }
        }
      }
    } catch(e) {}
  }

  if (result) _geoSet(address, result);
  return result || null;
}

// Haversine distance in km between two lat/lon points
function toggleUnit() {
  S.useImperial = !S.useImperial;
  localStorage.setItem('fr_imperial', S.useImperial ? '1' : '');
  render();
}

function unitPill() {
  return '<div class="unit-pill" id="unitPill" title="Tap to switch units">' +
    '<span class="' + (!S.useImperial ? 'up-on' : 'up-off') + '">KM</span>' +
    '<span class="' + (S.useImperial  ? 'up-on' : 'up-off') + '">MI</span>' +
  '</div>';
}

function kmToDisplay(km) {
  if (S.useImperial) return +(km * 0.621371).toFixed(1);
  return +parseFloat(km).toFixed(1);
}
function distUnit() { return S.useImperial ? 'mi' : 'km'; }

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2)
    + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180)
    * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── OSRM Routing (OpenStreetMap) ─────────────────────────────────────────────
async function osrmTrip(coords, fixedDest = false) {
  if (coords.length < 2) return null;
  const coordStr = coords.map(c => `${c.lon},${c.lat}`).join(';');
  const destParam = '&destination=last';
  const url = `https://router.project-osrm.org/trip/v1/driving/${coordStr}?roundtrip=false&source=first${destParam}&annotations=false`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  if (data.code !== 'Ok' || !data.trips?.length) return null;
  // Trust OSRM's optimized order — don't apply haversine 2-opt on top.
  // OSRM already uses real road distances. haversine post-processing breaks
  // geographic clustering (e.g. Whitby/Oshawa stops interleaved = backtracking).
  return { distance: data.trips[0].distance, duration: data.trips[0].duration, waypoints: data.waypoints.slice() };
}

function twoOptImprove(waypoints, coords) {
  if (waypoints.length <= 3) return waypoints;

  // Build ordered route from OSRM waypoint indices
  var order = waypoints.map(function(wp,i){ return { inputIdx:i, routePos:wp.waypoint_index }; });
  order.sort(function(a,b){ return a.routePos - b.routePos; });
  var route = order.map(function(o){ return o.inputIdx; });

  // Calculate total route distance using haversine
  function totalDist(r) {
    var d = 0;
    for (var x = 0; x < r.length - 1; x++) {
      d += haversineKm(coords[r[x]].lat, coords[r[x]].lon, coords[r[x+1]].lat, coords[r[x+1]].lon);
    }
    return d;
  }

  var origDist = totalDist(route);
  var best = route.slice();
  var bestDist = origDist;

  // 2-opt: try reversing every segment, keep improvements
  // Run multiple passes until no improvement found
  var improved = true, iterations = 0;
  while (improved && iterations < 100) {
    improved = false; iterations++;
    for (var i = 1; i < best.length - 2; i++) {
      for (var j = i + 1; j < best.length - 1; j++) {
        // Cost of current edges
        var d1 = haversineKm(coords[best[i-1]].lat, coords[best[i-1]].lon, coords[best[i]].lat, coords[best[i]].lon)
               + haversineKm(coords[best[j]].lat, coords[best[j]].lon, coords[best[j+1]].lat, coords[best[j+1]].lon);
        // Cost if we reverse segment [i..j]
        var d2 = haversineKm(coords[best[i-1]].lat, coords[best[i-1]].lon, coords[best[j]].lat, coords[best[j]].lon)
               + haversineKm(coords[best[i]].lat, coords[best[i]].lon, coords[best[j+1]].lat, coords[best[j+1]].lon);
        if (d2 < d1 - 0.005) {  // 5m minimum improvement
          var seg = best.slice(i, j+1).reverse();
          for (var k = 0; k < seg.length; k++) best[i+k] = seg[k];
          improved = true;
          bestDist = totalDist(best);
        }
      }
    }
  }

  // Or-opt: try moving each single stop to every other position
  // This catches cases 2-opt misses (single outlier stops)
  var orImproved = true, orIter = 0;
  while (orImproved && orIter < 50) {
    orImproved = false; orIter++;
    for (var i = 1; i < best.length - 1; i++) {
      var stop = best[i];
      var without = best.slice(0, i).concat(best.slice(i+1));
      // Try inserting stop at each position (not first or last = fixed endpoints)
      for (var j = 1; j < without.length; j++) {
        var candidate = without.slice(0, j).concat([stop]).concat(without.slice(j));
        var candDist = totalDist(candidate);
        if (candDist < bestDist - 0.005) {
          best = candidate;
          bestDist = candDist;
          orImproved = true;
          break;  // restart from this stop
        }
      }
      if (orImproved) break;
    }
  }

  // Only apply if we actually improved
  if (bestDist < origDist - 0.01) {
    console.log('[FlexRoute] Route improved: ' + origDist.toFixed(1) + 'km -> ' + bestDist.toFixed(1) + 'km (' + iterations + ' 2-opt + ' + orIter + ' or-opt iterations)');
  } else {
    console.log('[FlexRoute] OSRM order kept (already optimal)');
    best = route;  // revert to original OSRM order
  }

  // Rebuild waypoints in improved order
  var newWaypoints = new Array(waypoints.length);
  for (var p = 0; p < best.length; p++) {
    newWaypoints[best[p]] = { waypoint_index: p, name: waypoints[best[p]]?.name || '' };
  }
  return newWaypoints;
}

async function osrmRoute(coords) {
  if (coords.length < 2) return null;
  const coordStr = coords.map(c => `${c.lon},${c.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=false`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  if (data.code !== 'Ok' || !data.routes?.length) return null;
  return { distance: data.routes[0].distance, duration: data.routes[0].duration };
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function gMapsURL(chunkIndex) {
  const CHUNK = 5;
  const allStops = S.optimized.map(s => s.address);
  const idx = chunkIndex || 0;
  const chunk = allStops.slice(idx * CHUNK, (idx + 1) * CHUNK);
  if (!chunk.length) return '#';
  const chunkStart = idx === 0 ? (S.startAddr || '') : allStops[idx * CHUNK - 1];
  const isLast = (idx + 1) * CHUNK >= allStops.length;
  const chunkEnd = isLast ? S.home : '';
  const pts = [chunkStart, ...chunk, chunkEnd].filter(Boolean);
  return 'https://www.google.com/maps/dir/' + pts.map(p => encodeURIComponent(p)).join('/');
}
function totalChunks() { return Math.ceil(S.optimized.length / 5); }
function round1(n) { return Math.round(n * 10) / 10; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Geocoding cache (localStorage, 30-day TTL) ────────────────────────────
const _GEO_CACHE_KEY = 'fr_geo_v2';
function _geoLoad() { try { return JSON.parse(localStorage.getItem(_GEO_CACHE_KEY)||'{}'); } catch { return {}; } }
function _geoGet(addr, bLat, bLon) {
  try {
    var e = _geoLoad()[addr.toLowerCase().trim()];
    if (!e || Date.now()-e.t > 30*864e5) return null;
    if (bLat && bLon && haversineKm(e.lat, e.lon, bLat, bLon) > 150) { console.warn('[FlexRoute] Cache stale:', addr); return null; }
    return { lat: e.lat, lon: e.lon };
  } catch { return null; }
}
function _geoSet(addr, coords) {
  try {
    var c = _geoLoad(), k = addr.toLowerCase().trim();
    c[k] = { lat: coords.lat, lon: coords.lon, t: Date.now() };
    var keys = Object.keys(c);
    if (keys.length > 1000) { keys.sort((a,b)=>(c[a].t||0)-(c[b].t||0)).slice(0,200).forEach(k=>delete c[k]); }
    localStorage.setItem(_GEO_CACHE_KEY, JSON.stringify(c));
  } catch {}
}

// ── Global address cleaning (for correction input pre-fill) ───────────────
// truncateAfterStreetType is also defined inside parseFlexOCR for OCR parsing.
// This global version adds keepCity support for geocoding/normalizeAddress.
function truncateAfterStreetTypeG(addr, keepCity) {
  var types = 'avenue|ave|street|str|st|road|rd|drive|dr|boulevard|blvd|crescent|cres|court|crt|ct|way|place|pl|lane|ln|terrace|terr|trail|trl|parkway|pkwy|gate|grove|grv|path|park|square|sq|circle|cir|close|bend|mews|heights|hts|gardens|gdns|glen|ridge|commons|view|vista|manor|cove|cv|bay|broadway|plaza|row|vale|rise|green|walk|nook|keep|hill|hills|wood|woods|pass|point|pt|pointe|hollow|ford|crossing|run|loop|promenade|quay|wharf|esplanade';
  var dir  = '(?:\\s+(?:east|west|north|south|[ensw]\\.))?';
  var unit = '(?:\\s*(?:,\\s*)?(?:unit|apt|apartment|suite|ste|#|fl(?:oor)?)\\s*#?\\s*[\\w-]+)?(?:\\s+\\d+[A-Z]*)?'; // route number: State Road 46, Hwy 30
  var re = new RegExp('^(.+\\b(?:' + types + ')\\b' + dir + unit + ')', 'i');
  var m = addr.match(re);
  if (!m) return addr;
  var core = m[1].trim();
  // Honorific guard: "Dr/St" before uppercase proper noun = name prefix, not street type.
  if (/\b(Dr|St)\s*$/i.test(core)) {
    var _rem2 = addr.slice(m[1].length).trim();
    if (/^[A-Z]/.test(_rem2)) return addr;
  }
  if (!keepCity) return core;
  var suffix = addr.slice(m[1].length);
  var cm = suffix.match(/,\s*([A-Za-z][A-Za-z\s]{2,29}?(?:,\s*[A-Z]{2})?)(?:\s*$|,\s*(?:[A-Z][\dA-Z]|$))/);
  return cm ? (core + ', ' + cm[1].trim()) : core;
}
function normalizeAddress(addr) {
  if (!addr) return addr;
  var a = addr
    .replace(/^\w{0,2}\d{2,4}-(\d+\s+)/, '$1')
    .replace(/\b(unit|apt|apartment|suite|ste|floor|fl|rm|room|bldg|building)\s*#?\s*\w+\s*/gi, '')
    .replace(/\s*#\s*\d+\w*/g, '')
    .replace(/^(\d+\s+[A-Za-z][^,\d]*?)\s+\d{3,5}(\s*,)/, '$1$2')
    .replace(/,?\s*[A-Z]\d[A-Z]\s*\d[A-Z]\d\b/gi, '')
    .replace(/,?\s*\b\d{5}(-\d{4})?\b/g, '')
    .replace(/\s+,/g, ',').replace(/,\s*,/g, ',').replace(/,\s*$/g, '').replace(/\s{2,}/g, ' ').trim();
  return truncateAfterStreetTypeG(a, true);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function escH(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
